<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K-패스</title>

    <script src="https://kit.fontawesome.com/3074568ad1.js"></script>
    <link rel="stylesheet" href="/src/style.css" />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body class="bg-white text-slate-900">
    <!-- 헤더 -->
    <header
      class="fixed top-0 right-0 left-0 z-40 w-full bg-white lg:relative lg:top-auto lg:right-auto lg:left-auto lg:z-auto lg:border-b lg:border-slate-200"
    >
      <div class="mx-auto flex max-w-[1200px] items-center justify-between px-4 py-3 md:px-8 md:py-4 lg:px-6 lg:py-5">
        <h1 class="flex items-center">
          <a href="/" class="text-xl lg:text-4xl">
            <i class="fa-solid fa-subway"></i>
          </a>
        </h1>

        <nav class="hidden items-center space-x-14 text-base font-semibold lg:flex">
          <a href="#">사업소개</a>
          <a href="#">이용안내</a>
          <a href="#">K-패스 카드</a>
          <a href="/src/pages/notice/notice.html">공지사항</a>
          <a href="#">문의하기</a>
        </nav>

        <div class="hidden items-center divide-x divide-slate-300 text-xs font-medium lg:flex">
          <a href="#" class="px-3">로그인</a>
          <a href="#" class="px-3">회원가입</a>
        </div>

        <button id="menu-open-btn" class="text-xl lg:hidden">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </header>

    <!-- 모바일 메뉴 -->
    <div id="mobile-menu" class="fixed inset-0 z-50 hidden bg-white">
      <div class="flex h-full w-full flex-col">
        <div class="space-y-6 p-5 pb-16 md:px-8 lg:px-10">
          <div class="flex items-center justify-between text-xl">
            <button id="menu-home-btn"><i class="fa-solid fa-house"></i></button>
            <button id="menu-close-btn"><i class="fa-solid fa-xmark"></i></button>
          </div>

          <div class="text-sm font-bold tracking-tight">로그인 또는 회원가입을 해주세요!</div>

          <div class="flex gap-2">
            <button class="h-10 w-28 rounded-full bg-[#ff5500] text-sm font-semibold text-white">로그인</button>
            <button class="h-10 w-28 rounded-full border bg-white text-sm font-semibold">회원가입</button>
          </div>
        </div>

        <div class="flex flex-1 flex-col overflow-y-auto border-t border-slate-200 bg-slate-50">
          <nav class="min-h-full w-full">
            <ul class="flex min-h-full w-full flex-col">
              <li class="flex w-full">
                <a href="#" class="flex items-center gap-4 px-6 py-5 text-sm font-medium">
                  <i class="fa-solid fa-compass w-5 text-base"></i>
                  <span>사업소개</span>
                </a>
              </li>
              <li class="flex w-full">
                <a href="#" class="font-mesdium flex items-center gap-4 px-6 py-5 text-sm">
                  <i class="fa-solid fa-file-invoice w-5 text-base"></i>
                  <span>이용안내</span>
                </a>
              </li>
              <li class="flex w-full">
                <a href="#" class="flex items-center gap-4 px-6 py-5 text-sm font-medium">
                  <i class="fa-solid fa-credit-card w-5 text-base"></i>
                  <span>K-패스 카드</span>
                </a>
              </li>
              <li class="flex w-full">
                <a href="/src/pages/notice/notice.html" class="flex items-center gap-4 px-6 py-5 text-sm font-medium">
                  <i class="fa-solid fa-bell w-5 text-base"></i>
                  <span>공지사항</span>
                </a>
              </li>
              <li class="flex w-full">
                <a href="#" class="flex items-center gap-4 px-6 py-5 text-sm font-medium">
                  <i class="fa-solid fa-pen-to-square w-5 text-base"></i>
                  <span>문의하기</span>
                </a>
              </li>
              <li class="flex w-full">
                <a href="#" class="flex items-center gap-4 px-6 py-5 text-sm font-medium">
                  <i class="fa-solid fa-face-smile w-5 text-base"></i>
                  <span>이용약관</span>
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </div>

    <!-- 메인 -->
    <main class="min-h-screen w-full pt-28 pb-20 lg:pt-24 lg:pb-32">
      <div class="mx-auto max-w-[900px] px-5 lg:px-0">
        <div class="mb-6 flex items-center gap-2 text-xs text-slate-500 lg:text-sm">
          <i class="fa-solid fa-house"></i>
          <span class="text-[10px] lg:text-xs">></span>
          <span class="font-medium text-slate-800">공지사항</span>
        </div>

        <h2 class="mb-8 border-b-2 border-slate-900 pb-6 text-2xl font-bold text-slate-900 lg:text-3xl">공지사항</h2>

        <div class="border-b border-slate-300 pb-6">
          <div class="mb-3">
            <div class="h-6 w-14 rounded bg-slate-200"></div>
          </div>

          <h3 class="mb-6 text-xl font-bold lg:text-2xl">
            <div class="h-8 w-3/4 rounded-lg bg-slate-200"></div>
          </h3>

          <div class="flex justify-between text-sm text-slate-500">
            <div class="h-5 w-24 rounded bg-slate-100"></div>
            <div class="h-5 w-12 rounded bg-slate-100"></div>
          </div>
        </div>

        <div class="min-h-[400px] py-10 lg:min-h-[500px]">
          <div class="mb-8 h-[300px] w-full rounded-2xl bg-slate-100 lg:h-[400px]"></div>

          <div class="space-y-4">
            <div class="h-4 w-full rounded bg-slate-100"></div>
            <div class="h-4 w-5/6 rounded bg-slate-100"></div>
            <div class="h-4 w-4/6 rounded bg-slate-100"></div>
          </div>
        </div>

        <div class="border-t border-b border-slate-300 py-2">
          <div class="flex items-center border-b border-slate-100 py-4">
            <span class="w-16 shrink-0 text-sm font-bold text-slate-500">이전글</span>
            <div class="flex flex-1 items-center gap-3">
              <span class="text-sm text-slate-400">이전글이 없습니다.</span>
            </div>
          </div>

          <div class="flex items-center py-4">
            <span class="w-16 shrink-0 text-sm font-bold text-slate-500">다음글</span>
            <div class="flex flex-1 items-center gap-3">
              <span class="text-sm text-slate-400">다음글이 없습니다.</span>
            </div>
          </div>
        </div>

        <div class="mt-8 flex justify-center pt-8">
          <a
            href="/src/pages/notice/notice.html"
            class="flex w-full max-w-[200px] items-center justify-center rounded-xl border border-slate-300 bg-white py-4 text-sm font-bold text-slate-700 transition-colors hover:bg-slate-50"
          >
            목록
          </a>
        </div>
      </div>
    </main>

    <!-- 푸터 -->
    <footer class="hidden w-full border-t border-slate-400 bg-white px-8 py-24 lg:block">
      <div class="mx-auto flex max-w-[1200px] items-center justify-between">
        <i class="fa-solid fa-subway text-5xl text-slate-900"></i>

        <div class="flex flex-col items-end gap-y-3 text-xs tracking-tight text-slate-500">
          <div class="flex items-center gap-x-3">
            <a href="#">서비스이용약관</a>
            <a href="#" class="font-bold text-slate-900">개인정보처리방침</a>
            <a href="#">이메일무단수집거부</a>
            <a href="#">품질오류신고</a>
          </div>

          <div class="text-[11px] font-light text-slate-400">
            Copyright ⓒ Ministry of Land, Infrastructure and Transport. All Rights Reserved.
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
